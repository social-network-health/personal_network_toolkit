<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PNA evaluate-report viewer</title>
<!--
  Visual Validator — Phases 2-5 (plans/visual-validator-plan.md). Static, zero-dependency,
  engine-agnostic vanilla JS. No build, no framework, no network, no Chromium-only APIs.
  DOM is built with textContent so report strings cannot inject HTML.

  Renders evaluate-report.schema.json instances in two registers (developer A0 / end-user A1),
  with view modes end-user | side-by-side (finding-aligned) | developer (mode persists in
  localStorage; ?mode=). Loads ONE report or a SET you flip through with ‹ Prev / Next › / ← → /
  a jump dropdown.

  Load a set:
    - drag several report files onto the page, or pick several in the file dialog;
    - ?reports=a.json,b.json,c.json     (explicit list)
    - ?dir=<path>                       (fetches <path>/index.json — an array of filenames)
  ?report= / ?reports= / ?dir= and the sample buttons use fetch(), which needs serving:
      just view-reports [dir]     # or:  python3 -m http.server --directory tools/report-viewer
-->
<style>
  :root {
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1c2330; --muted:#5c6573; --line:#e1e5ea;
    --accent:#2f6feb;
    --ok-bg:#e7f5ec; --ok-fg:#1c7a3f; --ok-bd:#b7dfc1;
    --no-bg:#fdeaec; --no-fg:#b02a37; --no-bd:#f3b6bb;
    --na-bg:#eef0f3; --na-fg:#5c636a; --na-bd:#d5d9dd;
    --ud-bg:#fff5e1; --ud-fg:#946000; --ud-bd:#f3dca0;
    --det-bg:#e8f0fe; --det-fg:#1b4fb3; --llm-bg:#f0e9fd; --llm-fg:#6b35c9; --hum-bg:#e3f6f4; --hum-fg:#0f7b71;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  a { color:var(--accent); }
  header { position:sticky; top:0; z-index:5; background:var(--panel); border-bottom:1px solid var(--line);
    padding:10px 18px; display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:650; letter-spacing:.2px; }
  header .controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-left:auto; }
  .btn { font:inherit; font-size:13px; padding:5px 10px; border:1px solid var(--line); border-radius:7px;
    background:#fff; color:var(--ink); cursor:pointer; }
  .btn:hover { border-color:var(--accent); color:var(--accent); }
  .btn[disabled] { opacity:.4; cursor:default; border-color:var(--line); color:var(--muted); }
  .hint { color:var(--muted); font-size:13px; }

  /* view-mode segmented control */
  .modebar { display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .modebtn { font:inherit; font-size:13px; padding:5px 11px; border:0; border-left:1px solid var(--line);
    background:#fff; color:var(--muted); cursor:pointer; }
  .modebtn:first-child { border-left:0; }
  .modebtn:hover { color:var(--accent); }
  .modebtn.active { background:var(--accent); color:#fff; }

  main { max-width:1060px; margin:0 auto; padding:22px 18px 80px; }

  /* report set navigation (←/→) */
  .navbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; background:var(--panel);
    border:1px solid var(--line); border-radius:10px; padding:8px 12px; margin:0 0 14px;
    position:sticky; top:54px; z-index:4; }
  .navselect { font:inherit; font-size:13px; padding:4px 8px; border:1px solid var(--line); border-radius:7px; max-width:46ch; }
  .navpos { color:var(--muted); font-size:13px; margin-left:auto; font-variant-numeric:tabular-nums; }

  .empty { text-align:center; color:var(--muted); padding:64px 16px; border:2px dashed var(--line);
    border-radius:14px; background:var(--panel); }
  .empty strong { color:var(--ink); }
  body.dragging .empty, body.dragging main { outline:3px dashed var(--accent); outline-offset:-6px; }
  .error { background:var(--no-bg); color:var(--no-fg); border:1px solid var(--no-bd);
    padding:14px 16px; border-radius:10px; white-space:pre-wrap; }

  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin:14px 0; }
  .cand-name { font-size:18px; font-weight:680; margin:0 0 4px; }
  .meta { color:var(--muted); font-size:13px; display:flex; gap:14px; flex-wrap:wrap; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .chip { font-size:12px; background:#f1f3f6; border:1px solid var(--line); border-radius:20px; padding:2px 9px; color:var(--muted); }
  .chip b { color:var(--ink); font-weight:600; }

  .headline { font-size:16px; margin:6px 0 10px; }
  .counts { display:flex; gap:8px; flex-wrap:wrap; }

  .badge { display:inline-block; font-size:12px; font-weight:650; padding:2px 9px; border-radius:20px; border:1px solid; vertical-align:middle; }
  .st-conformant{background:var(--ok-bg);color:var(--ok-fg);border-color:var(--ok-bd);}
  .st-non-conformant{background:var(--no-bg);color:var(--no-fg);border-color:var(--no-bd);}
  .st-not-applicable{background:var(--na-bg);color:var(--na-fg);border-color:var(--na-bd);}
  .st-unable-to-determine{background:var(--ud-bg);color:var(--ud-fg);border-color:var(--ud-bd);}
  .st-mixed{background:var(--ud-bg);color:var(--ud-fg);border-color:var(--ud-bd);}
  .st-indeterminate{background:var(--na-bg);color:var(--na-fg);border-color:var(--na-bd);}

  /* developer (A0) finding */
  .finding { border-left:4px solid var(--line); padding:12px 0 12px 14px; margin:10px 0; }
  .finding.s-conformant{border-left-color:var(--ok-fg);}
  .finding.s-non-conformant{border-left-color:var(--no-fg);}
  .finding.s-not-applicable{border-left-color:var(--na-bd);}
  .finding.s-unable-to-determine{border-left-color:var(--ud-fg);}
  .finding h3 { margin:0; font-size:15px; display:flex; gap:9px; align-items:center; flex-wrap:wrap; }
  .finding h3 .ac { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  .src { font-size:11px; color:var(--muted); }
  .field { margin:8px 0 0; }
  .field .k { font-size:12px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); margin-bottom:2px; }
  .req { background:#fbfcfd; border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
  ul.cites, ul.evi { list-style:none; margin:4px 0 0; padding:0; }
  ul.cites li, ul.evi li { padding:4px 0; border-top:1px dashed var(--line); }
  ul.cites li:first-child, ul.evi li:first-child { border-top:0; }
  code.path { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px; background:#f1f3f6; padding:1px 5px; border-radius:5px; }
  .note { color:var(--muted); }
  .ev-src { display:inline-block; font-size:11px; font-weight:650; padding:1px 7px; border-radius:6px; margin-right:6px; }
  .ev-deterministic{background:var(--det-bg);color:var(--det-fg);} .ev-llm{background:var(--llm-bg);color:var(--llm-fg);} .ev-human{background:var(--hum-bg);color:var(--hum-fg);}
  .hr-flag { color:var(--ud-fg); font-size:12px; font-weight:650; }

  /* verdict colours (shared by A1) */
  .v-ok{color:var(--ok-fg);} .v-no{color:var(--no-fg);} .v-na{color:var(--na-fg);} .v-ud{color:var(--ud-fg);}

  /* end-user (A1) */
  .a1-summary { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin:14px 0; }
  .a1-summary.v-ok{border-left:5px solid var(--ok-fg);} .a1-summary.v-no{border-left:5px solid var(--no-fg);}
  .a1-summary.v-ud{border-left:5px solid var(--ud-fg);} .a1-summary.v-na{border-left:5px solid var(--na-fg);}
  .a1-bigverdict { font-size:17px; font-weight:680; margin-bottom:6px; }
  .a1-headline { margin:4px 0 8px; }
  .a1-tally { color:var(--muted); font-size:13px; margin-bottom:10px; }
  .caveat { background:#fff7e6; border:1px solid var(--ud-bd); border-radius:8px; padding:8px 10px; font-size:13px; color:#7a5a00; }
  .a1-finding { border-left:4px solid var(--line); padding:10px 0 10px 14px; margin:10px 0; }
  .a1-finding.v-ok{border-left-color:var(--ok-fg);} .a1-finding.v-no{border-left-color:var(--no-fg);}
  .a1-finding.v-na{border-left-color:var(--na-bd);} .a1-finding.v-ud{border-left-color:var(--ud-fg);}
  .a1-head { display:flex; gap:10px; align-items:baseline; flex-wrap:wrap; }
  .a1-verdict { font-weight:680; font-size:15px; }
  .a1-goal { font-size:14px; }
  .a1-ac { font-size:11px; color:var(--muted); font-family:ui-monospace,SFMono-Regular,Menlo,monospace; margin-left:auto; }
  .a1-line { margin-top:5px; }

  /* side-by-side: finding-aligned 2-column grid (A1 | A0 per row) */
  .sxs { display:grid; grid-template-columns:1fr 1fr; gap:0 20px; align-items:start; }
  .sxs > * { border-top:1px solid var(--line); padding-top:12px; }
  .sxs > .sxs-label { border-top:0; padding-top:0; }
  .sxs-label { font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); font-weight:650; padding-bottom:4px; }
  .sxs .a1-summary, .sxs .card { margin:0; }
  @media (max-width:760px){ .sxs { grid-template-columns:1fr; } }

  footer { max-width:1060px; margin:0 auto; padding:0 18px 40px; color:var(--muted); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>PNA evaluate-report viewer</h1>
  <span class="hint">drag report(s) on, or</span>
  <label class="btn">open file…<input id="file" type="file" accept=".json,application/json" multiple hidden></label>
  <div class="modebar" role="group" aria-label="view mode">
    <button class="modebtn" data-mode="end-user">End-user</button>
    <button class="modebtn" data-mode="side-by-side">Side by side</button>
    <button class="modebtn" data-mode="developer">Developer</button>
  </div>
  <div class="controls">
    <span class="hint">samples:</span>
    <button class="btn" data-sample="01-conformant-minimal-pna.json">conformant</button>
    <button class="btn" data-sample="02-non-conformant-leaky-app.json">non-conformant</button>
    <button class="btn" data-sample="03-mixed-exceptions-and-constraints.json">mixed</button>
    <button class="btn" data-sample-set="01-conformant-minimal-pna.json,02-non-conformant-leaky-app.json,03-mixed-exceptions-and-constraints.json">▸ flip all 3</button>
  </div>
</header>
<main id="content"></main>
<footer>Renders <code>tools/evaluate-report.schema.json</code> instances in two registers from one JSON; load a set and flip with ← / →. Both views derive from the same data — the end-user view invents nothing the report doesn't assert.</footer>

<script>
"use strict";
const content = document.getElementById("content");
const STATUSES = ["conformant","non-conformant","not-applicable","unable-to-determine"];
const MODES = ["end-user","side-by-side","developer"];

const GOAL_NAMES = {
  1: "Your private data stays on your device",
  2: "You own your contacts locally",
  3: "You choose how you reach out",
  4: "Your data is portable & recoverable",
  5: "Diagnosable without leaking your data",
};
const VERDICT = {
  "conformant": {icon:"✓", label:"Good", cls:"v-ok"},
  "non-conformant": {icon:"✗", label:"At risk", cls:"v-no"},
  "not-applicable": {icon:"–", label:"Not relevant here", cls:"v-na"},
  "unable-to-determine": {icon:"?", label:"Unclear", cls:"v-ud"},
};
const POSTURE_PLAIN = {
  "conformant": "Looks safe to trust with your data — measured against this spec's promises.",
  "non-conformant": "Not safe to trust with your relationship data as it stands.",
  "mixed": "Mostly sound, with some caveats worth weighing.",
  "indeterminate": "Couldn't be fully assessed — a human should take a closer look.",
};
const POSTURE_CLS = {conformant:"v-ok", "non-conformant":"v-no", mixed:"v-ud", indeterminate:"v-na"};
const CAVEAT = "This measures the app against the PNA spec's specific promises. An app may not be trying to be a PNA — a poor result is a mismatch with these particular commitments, not a claim that the app is bad.";
const STATUS_RANK = {"non-conformant":0, "unable-to-determine":1, "conformant":2, "not-applicable":3};

const params = new URLSearchParams(location.search);
let reportSet = [];   // [{ obj, label }]
let reportIndex = 0;
let viewMode = params.get("mode") || localStorage.getItem("vv-mode") || "side-by-side";
if (!MODES.includes(viewMode)) viewMode = "side-by-side";

function el(tag, attrs, ...kids) {
  const n = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    const v = attrs[k];
    if (v == null) continue;
    if (k === "class") n.className = v;
    else if (k === "text") n.textContent = v;
    else if (k.slice(0,2) === "on" && typeof v === "function") n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v);
  }
  for (const kid of kids) {
    if (kid == null) continue;
    n.append(kid.nodeType ? kid : document.createTextNode(String(kid)));
  }
  return n;
}
function field(label, ...kids) { return el("div", {class:"field"}, el("div", {class:"k", text:label}), ...kids); }
function safeLink(url, label) {
  return /^https?:\/\//i.test(url) ? el("a", {href:url, target:"_blank", rel:"noopener", text:label || url})
                                   : document.createTextNode(label || url);
}
function plainText(s) {
  return String(s)
    .replace(/\bMUST NOT\b/g, "must never").replace(/\bSHOULD NOT\b/g, "should not")
    .replace(/\bMUST\b/g, "must").replace(/\bSHOULD\b/g, "should").replace(/\bMAY\b/g, "may");
}
function firstDetail(f) {
  if (Array.isArray(f.evidence)) for (const e of f.evidence) if (e && e.detail) return e.detail;
  if (Array.isArray(f.citations) && f.citations[0] && f.citations[0].note) return f.citations[0].note;
  return null;
}
function labelOf(obj, src) {
  return (obj && obj.candidate && obj.candidate.name) || (src ? String(src).split("/").pop() : "report");
}
function concernSort(findings) {
  return findings.map((f, i) => [f, i]).sort((a, b) => {
    const ra = STATUS_RANK[a[0].status] ?? 9, rb = STATUS_RANK[b[0].status] ?? 9;
    if (ra !== rb) return ra - rb;
    const ga = Math.min(...((a[0].goals && a[0].goals.length) ? a[0].goals : [9]));
    const gb = Math.min(...((b[0].goals && b[0].goals.length) ? b[0].goals : [9]));
    if (ga !== gb) return ga - gb;
    return a[1] - b[1];
  }).map(x => x[0]);
}

// ---- developer (A0) ----
function renderCitation(c) {
  if (!c || typeof c !== "object") return el("li", {text:String(c)});
  const path = el("code", {class:"path", text:(c.lines ? c.path + ":" + c.lines : c.path)});
  const kids = [path];
  if (c.note) kids.push(el("span", {class:"note", text:" — " + c.note}));
  return el("li", null, ...kids);
}
function renderEvidence(e) {
  if (!e || typeof e !== "object") return el("li", {text:String(e)});
  const src = el("span", {class:"ev-src ev-" + (e.source||""), text:(e.source||"?") + (e.tool ? " · " + e.tool : "")});
  const li = el("li", null, src, el("span", {text:e.detail || ""}));
  if (Array.isArray(e.citations) && e.citations.length) li.append(el("ul", {class:"cites"}, ...e.citations.map(renderCitation)));
  return li;
}
function renderFindingA0(f) {
  const status = STATUSES.includes(f.status) ? f.status : "indeterminate";
  const card = el("div", {class:"finding s-" + status});
  const h = el("h3", null, el("span", {class:"ac", text:f.ac_id || "(no ac_id)"}),
    el("span", {class:"badge st-" + status, text:f.status || "?"}));
  if (f.ac_source) h.append(el("span", {class:"src", text:f.ac_source}));
  if (Array.isArray(f.goals) && f.goals.length) h.append(el("span", {class:"src", text:"Goals " + f.goals.join(", ")}));
  if (f.needs_human_review) h.append(el("span", {class:"hr-flag", text:"⚑ needs human review"}));
  card.append(h);
  if (f.requirement) card.append(field("Requirement", el("div", {class:"req", text:f.requirement})));
  if (f.rationale)   card.append(field("Rationale", el("div", {text:f.rationale})));
  if (Array.isArray(f.citations) && f.citations.length) card.append(field("Citations", el("ul", {class:"cites"}, ...f.citations.map(renderCitation))));
  if (Array.isArray(f.evidence) && f.evidence.length)   card.append(field("Evidence", el("ul", {class:"evi"}, ...f.evidence.map(renderEvidence))));
  return card;
}
function renderSummaryA0(summ, findings) {
  const sum = el("div", {class:"card"});
  const posture = summ.posture || "indeterminate";
  sum.append(el("div", null, el("span", {class:"badge st-" + posture, text:posture})));
  if (summ.headline) sum.append(el("p", {class:"headline", text:summ.headline}));
  const counts = {};
  for (const f of findings) counts[f.status] = (counts[f.status]||0) + 1;
  const row = el("div", {class:"counts"});
  row.append(el("span", {class:"chip"}, el("b", {text:findings.length + " "}), "findings"));
  for (const s of STATUSES) if (counts[s]) row.append(el("span", {class:"badge st-" + s, text:counts[s] + " " + s}));
  sum.append(row);
  if (Array.isArray(summ.leading_concerns) && summ.leading_concerns.length)
    sum.append(field("Leading concerns", el("div", {class:"chips"}, ...summ.leading_concerns.map(ac => el("span", {class:"chip"}, el("b", {text:ac}))))));
  return sum;
}

// ---- end-user (A1) ----
function renderFindingA1(f) {
  const v = VERDICT[f.status] || {icon:"•", label:f.status || "?", cls:"v-na"};
  const card = el("div", {class:"a1-finding " + v.cls});
  const goals = (Array.isArray(f.goals) ? f.goals : []).map(g => GOAL_NAMES[g]).filter(Boolean);
  card.append(el("div", {class:"a1-head"},
    el("span", {class:"a1-verdict " + v.cls, text:v.icon + " " + v.label}),
    goals.length ? el("span", {class:"a1-goal", text:goals.join(" · ")}) : null,
    f.ac_id ? el("span", {class:"a1-ac", text:f.ac_id}) : null));
  if (f.status === "non-conformant") {
    if (f.requirement) card.append(el("div", {class:"a1-line"}, el("b", {text:"A safe app: "}), plainText(f.requirement)));
    const here = f.rationale || firstDetail(f);
    if (here) card.append(el("div", {class:"a1-line"}, el("b", {text:"Here: "}), here));
  } else if (f.status === "unable-to-determine") {
    if (f.rationale) card.append(el("div", {class:"a1-line note"}, el("b", {text:"Unclear: "}), f.rationale));
  } else if (f.status === "not-applicable") {
    if (f.rationale) card.append(el("div", {class:"a1-line note", text:f.rationale}));
  } else {
    card.append(el("div", {class:"a1-line note", text:firstDetail(f) || "This protection is handled."}));
  }
  return card;
}
function renderSummaryA1(summ, findings) {
  const posture = summ.posture || "indeterminate";
  const cls = POSTURE_CLS[posture] || "v-na";
  const box = el("div", {class:"a1-summary " + cls});
  box.append(el("div", {class:"a1-bigverdict " + cls, text:POSTURE_PLAIN[posture] || posture}));
  if (summ.headline) box.append(el("p", {class:"a1-headline", text:summ.headline}));
  const c = {};
  for (const f of findings) c[f.status] = (c[f.status]||0) + 1;
  const tally = [];
  if (c["non-conformant"]) tally.push(c["non-conformant"] + " at risk");
  if (c["unable-to-determine"]) tally.push(c["unable-to-determine"] + " unclear");
  if (c["conformant"]) tally.push(c["conformant"] + " good");
  if (c["not-applicable"]) tally.push(c["not-applicable"] + " not relevant");
  if (tally.length) box.append(el("div", {class:"a1-tally", text:tally.join(" · ")}));
  box.append(el("div", {class:"caveat", text:CAVEAT}));
  return box;
}
function renderCandidateCard(obj, cand, label) {
  const head = el("div", {class:"card"});
  head.append(el("p", {class:"cand-name", text:cand.name || "(unnamed candidate)"}));
  const meta = el("div", {class:"meta"});
  if (cand.repo_url) meta.append(el("span", null, safeLink(cand.repo_url)));
  if (cand.commit) meta.append(el("span", {text:"commit " + String(cand.commit).slice(0,12)}));
  if (cand.pna_spec_version) meta.append(el("span", {text:"PNA Spec " + cand.pna_spec_version}));
  if (cand.picks_source) meta.append(el("span", {text:"picks: " + cand.picks_source}));
  if (obj.report_schema_version) meta.append(el("span", {text:"report v" + obj.report_schema_version}));
  if (label) meta.append(el("span", {text:"⟵ " + label}));
  head.append(meta);
  if (cand.axis_picks && typeof cand.axis_picks === "object") {
    const chips = el("div", {class:"chips"});
    for (const ax in cand.axis_picks) chips.append(el("span", {class:"chip"}, el("b", {text:ax + ": "}), cand.axis_picks[ax]));
    head.append(chips);
  }
  return head;
}

// ---- report-set navigation ----
function renderNav() {
  const bar = el("div", {class:"navbar"});
  const prev = el("button", {class:"btn", text:"‹ Prev", onclick:() => go(-1)});
  const next = el("button", {class:"btn", text:"Next ›", onclick:() => go(1)});
  if (reportIndex === 0) prev.setAttribute("disabled", "");
  if (reportIndex === reportSet.length - 1) next.setAttribute("disabled", "");
  const sel = el("select", {class:"navselect", onchange:e => jumpTo(parseInt(e.target.value, 10))});
  reportSet.forEach((r, i) => {
    const o = el("option", {value:String(i), text:r.label || ("report " + (i + 1))});
    if (i === reportIndex) o.setAttribute("selected", "");
    sel.append(o);
  });
  bar.append(prev, sel, next, el("span", {class:"navpos", text:(reportIndex + 1) + " / " + reportSet.length}));
  return bar;
}
function go(d) {
  if (reportSet.length < 2) return;
  reportIndex = Math.max(0, Math.min(reportSet.length - 1, reportIndex + d));
  render();
}
function jumpTo(i) { if (i >= 0 && i < reportSet.length) { reportIndex = i; render(); } }

// ---- render dispatch ----
function render() {
  if (!reportSet.length) { showEmpty(); return; }
  const {obj, label} = reportSet[reportIndex];
  const findings = concernSort(Array.isArray(obj.findings) ? obj.findings : []);
  const cand = obj.candidate || {}, summ = obj.summary || {};
  const nodes = [];
  if (reportSet.length > 1) nodes.push(renderNav());
  nodes.push(renderCandidateCard(obj, cand, label));

  if (viewMode === "developer") {
    nodes.push(renderSummaryA0(summ, findings), el("div", null, ...findings.map(renderFindingA0)));
  } else if (viewMode === "end-user") {
    nodes.push(renderSummaryA1(summ, findings), el("div", null, ...findings.map(renderFindingA1)));
  } else { // side-by-side — finding-aligned (A1 | A0 per grid row)
    const grid = el("div", {class:"sxs"});
    grid.append(el("div", {class:"sxs-label", text:"In plain language"}), el("div", {class:"sxs-label", text:"Technical detail"}));
    grid.append(renderSummaryA1(summ, findings), renderSummaryA0(summ, findings));
    for (const f of findings) grid.append(renderFindingA1(f), renderFindingA0(f));
    nodes.push(grid);
  }
  content.replaceChildren(...nodes);
  document.title = (cand.name ? cand.name + " — " : "") + "PNA evaluate-report" +
    (reportSet.length > 1 ? " (" + (reportIndex + 1) + "/" + reportSet.length + ")" : "");
}

function showEmpty() {
  content.replaceChildren(el("div", {class:"empty"},
    el("p", null, el("strong", {text:"Drop evaluate-report.json file(s) here"}), " — or use ", el("strong", {text:"open file…"}), ", or a sample."),
    el("p", {class:"hint", text:"Drop several to flip through them with ← / →. Toggle End-user / Side by side / Developer once loaded."})));
}
function showError(msg) { content.replaceChildren(el("div", {class:"error", text:msg})); }

// ---- loading ----
function loadSet(items) {
  items = (items || []).filter(x => x && x.obj && typeof x.obj === "object");
  if (!items.length) { showError("No valid reports loaded."); return; }
  reportSet = items;
  reportIndex = 0;
  render();
}
function loadText(text, label) {
  let obj;
  try { obj = JSON.parse(text); } catch (e) { showError("Not valid JSON: " + e.message); return; }
  loadSet([{obj, label:labelOf(obj, label)}]);
}
function fetchItem(url) {
  return fetch(url).then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
    .then(t => { const obj = JSON.parse(t); return {obj, label:labelOf(obj, url)}; });
}
function loadUrls(urls) {
  Promise.all(urls.map(u => fetchItem(u).catch(() => null))).then(items => {
    const good = items.filter(Boolean);
    if (good.length) loadSet(good);
    else showError("Could not load: " + urls.join(", ") + "\n\nfetch is blocked on file:// — drag the report(s) onto the page, " +
      "use “open file…”, or serve the folder:  just view-reports   (or  python3 -m http.server)");
  });
}
function loadDir(dir) {
  const base = dir.replace(/\/+$/, "");
  fetch(base + "/index.json").then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(m => {
      const files = Array.isArray(m) ? m : (m && Array.isArray(m.reports) ? m.reports : []);
      if (!files.length) throw new Error("manifest lists no reports");
      loadUrls(files.map(f => base + "/" + f));
    })
    .catch(e => showError("Could not load directory manifest " + base + "/index.json (" + e.message + ")."));
}
function readFiles(fileList) {
  Promise.all([...fileList].map(f => f.text().then(t => {
    try { return {obj:JSON.parse(t), label:labelOf(JSON.parse(t), f.name)}; } catch (e) { return null; }
  }))).then(items => {
    const good = items.filter(Boolean);
    if (good.length) loadSet(good); else showError("No valid evaluate-report.json in the selection.");
  });
}

// ---- view-mode control ----
function updateModebar() {
  for (const b of document.querySelectorAll("[data-mode]")) b.classList.toggle("active", b.getAttribute("data-mode") === viewMode);
}
function setMode(m) {
  if (!MODES.includes(m)) return;
  viewMode = m;
  try { localStorage.setItem("vv-mode", m); } catch (e) { /* private mode */ }
  updateModebar();
  if (reportSet.length) render();
}
for (const b of document.querySelectorAll("[data-mode]")) b.addEventListener("click", () => setMode(b.getAttribute("data-mode")));
if (params.get("mode")) { try { localStorage.setItem("vv-mode", viewMode); } catch (e) {} }
updateModebar();

// ---- input wiring ----
document.getElementById("file").addEventListener("change", e => {
  if (e.target.files && e.target.files.length) readFiles(e.target.files);
});
for (const b of document.querySelectorAll("[data-sample]"))
  b.addEventListener("click", () => loadUrls(["sample-reports/" + b.getAttribute("data-sample")]));
for (const b of document.querySelectorAll("[data-sample-set]"))
  b.addEventListener("click", () => loadUrls(b.getAttribute("data-sample-set").split(",").map(s => "sample-reports/" + s.trim())));

["dragenter","dragover"].forEach(ev => document.addEventListener(ev, e => { e.preventDefault(); document.body.classList.add("dragging"); }));
["dragleave","drop"].forEach(ev => document.addEventListener(ev, e => { e.preventDefault(); document.body.classList.remove("dragging"); }));
document.addEventListener("drop", e => {
  if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) readFiles(e.dataTransfer.files);
});
document.addEventListener("keydown", e => {
  if (reportSet.length < 2) return;
  const t = e.target;
  if (t && /^(INPUT|SELECT|TEXTAREA)$/.test(t.tagName)) return;
  if (e.key === "ArrowLeft") { go(-1); e.preventDefault(); }
  else if (e.key === "ArrowRight") { go(1); e.preventDefault(); }
});

// ---- initial ----
const dirParam = params.get("dir"), reportsParam = params.get("reports"), reportParam = params.get("report");
if (dirParam) loadDir(dirParam);
else if (reportsParam) loadUrls(reportsParam.split(",").map(s => s.trim()).filter(Boolean));
else if (reportParam) loadUrls([reportParam]);
else showEmpty();
</script>
</body>
</html>
