# Reference-design manifest for fellows_local_db. See
# reference_designs/templates/design.toml for the field reference.
#
# This design is "accepted by definition" (the toolkit was distilled from it).
# Archived at the post-#267 commit below (fellows main @ dc3e0cf). The Tier-0
# keystone is complete: the [verify] entrypoint `just evaluate-report` now lands
# (fellows PR #267 — a deterministic, stdlib evaluate-report.json emitter that is
