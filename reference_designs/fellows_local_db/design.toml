# Reference-design manifest for fellows_local_db. See
# reference_designs/templates/design.toml for the field reference.
#
# This design is "accepted by definition" (the toolkit was distilled from it).
# Archived at the post-#267 commit below (fellows main @ dc3e0cf). The Tier-0
# keystone is complete: the [verify] entrypoint `just evaluate-report` now lands
# (fellows PR #267 — a deterministic, stdlib evaluate-report.json emitter that is
# schema-valid and byte-stable). The git-compatible SWHIDs were computed by
# tools/swh-save.sh and are content-addressed (valid independent of ingest timing);
# the Software Heritage Save Code Now request 2352911 was submitted 2026-06-09 and
# ingest is async (minutes to hours). swhid_rev == swh:1:rev:<commit>, cross-checked
# by tools/lint-spec-ids.py. (docs/roadmap.md Tier 0.)

name = "fellows_local_db"
repo = "https://github.com/richbodo/fellows_local_db"
toolkit_version = "0.1"
status = "active"
archival = "archived"   # Tier-0 keystone complete: [verify] entrypoint landed (fellows #267); SWHIDs git-verified; SH ingest (req 2352911) async

commit    = "dc3e0cffbbca44547c6987602fbbb1003d6920e6"
swhid_rev = "swh:1:rev:dc3e0cffbbca44547c6987602fbbb1003d6920e6"
swhid_dir = "swh:1:dir:d69ecdfbee779a45d8c5a129e6787b623f6bc4c4"

[flavor]
distribution = "web-bundle-with-magic-link"
storage = "opfs-sqlite-wasm"
ingestion = "single-source-static-mirror"
workspace = "vanilla-js-spa"
comms = "mailto-only"
mcp-exposure = "shared+private+comms"

[verify]
runner = "container"
entrypoint = "just evaluate-report"    # fellows #267: deterministic, stdlib evaluate-report.json emitter (schema-valid, byte-stable)
emits_report = "evaluate-report.json"
