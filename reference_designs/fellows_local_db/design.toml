name = "fellows_local_db"
repo = "https://github.com/richbodo/fellows_local_db"
toolkit_version = "0.1"
status = "active"
archival = "archived"   # re-pinned to fellows #289 (98b283f) for 100% realization-pointer coverage. SWHIDs are git-computed/content-addressed; Save Code Now for THIS commit is PENDING (offline --no-save re-pin) — the prior submit (req 2352911) was for dc3e0cf. Run `just rearchive` without --no-save (or `just swh-save`) to submit 98b283f.

commit    = "98b283f10cfa0196006f66b9507179f25e821ef6"
swhid_rev = "swh:1:rev:98b283f10cfa0196006f66b9507179f25e821ef6"
swhid_dir = "swh:1:dir:1bb784328e99fe888addf2e04fc2bbdf66b5ec05"

[flavor]
distribution = "web-bundle-with-magic-link"
storage = "opfs-sqlite-wasm"
ingestion = "single-source-static-mirror"
workspace = "vanilla-js-spa"
comms = "mailto-only"
mcp-exposure = "shared+private+comms"

[verify]
runner = "container"
entrypoint = "just evaluate-report"    # fellows #267: deterministic, stdlib evaluate-report.json emitter (schema-valid, byte-stable)
emits_report = "evaluate-report.json"
