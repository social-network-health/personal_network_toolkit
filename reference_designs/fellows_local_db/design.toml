# Reference-design manifest for fellows_local_db. See
# reference_designs/templates/design.toml for the field reference.
#
# This design is "accepted by definition" (the toolkit was distilled from it).
# The [verify] entrypoint `just evaluate-report` (fellows PR #267) emits a
# deterministic, stdlib, schema-valid evaluate-report.json. The git-compatible
# SWHIDs below are computed by tools/swh-save.sh and are content-addressed (valid
# independent of Save Code Now ingest timing); swhid_rev == swh:1:rev:<commit>,
# cross-checked by tools/lint-spec-ids.py. The `archival` line records the current
# pin + ingest request. (docs/roadmap.md Tier 0.)

name = "fellows_local_db"
repo = "https://github.com/richbodo/fellows_local_db"
toolkit_version = "0.2"
status = "active"
archival = "archived"   # re-pinned to pnt-ref-0.2.1 (85b3a84) for the RZ-* relabel (AC-3/12/13/14 -> RZ-1/2/3/4; AC-PRM-C n/a -> RZ-5; #103). SWHIDs git-computed/content-addressed; Save Code Now submitted 2026-06-25 — ingest async.

commit    = "85b3a84f2a9e332ba5b6e70b60b0c3bd75850ae1"   # fellows@pnt-ref-0.2.1 — RZ-* relabel (#103)
swhid_rev = "swh:1:rev:85b3a84f2a9e332ba5b6e70b60b0c3bd75850ae1"
swhid_dir = "swh:1:dir:0d378a2c88bb4c17976a702d463e80335432fd0a"

[flavor]
distribution = "web-bundle-with-magic-link"
storage = "opfs-sqlite-wasm"
ingestion = "single-source-static-mirror"
workspace = "vanilla-js-spa"
comms = "mailto-only"
mcp-exposure = "shared+private+comms"

[verify]
runner = "container"
entrypoint = "just evaluate-report"    # fellows #267: deterministic, stdlib evaluate-report.json emitter (schema-valid, byte-stable)
emits_report = "evaluate-report.json"
