# Reference-design manifest for fellows_local_db. See
# reference_designs/templates/design.toml for the field reference.
#
# This design is "accepted by definition" (the toolkit was distilled from it),
# but its Software Heritage archival is still pending (Phase 5 in the repo
# README), so archival = "pending" and the commit/SWHID/verify fields are
# honest TODOs the maintainer fills at archival — exactly the in-flight state the
# lint's honest-deferral rule permits.

name = "fellows_local_db"
repo = "https://github.com/richbodo/fellows_local_db"
toolkit_version = "0.1"
status = "active"
archival = "pending"

commit = ""        # TODO(maintainer): the accepted commit SHA at archival
swhid_rev = ""     # TODO(maintainer): swh:1:rev:<commit>  (tools/swh-save.sh prints it)
swhid_dir = ""     # TODO(maintainer): swh:1:dir:<tree>

[flavor]
distribution = "web-bundle-with-magic-link"
storage = "opfs-sqlite-wasm"
ingestion = "single-source-static-mirror"
workspace = "vanilla-js-spa"
comms = "mailto-only"
mcp-exposure = "shared+private+comms"

[verify]
runner = "container"
entrypoint = ""    # TODO(maintainer): command that builds + runs the e2e/conformance suite
emits_report = "evaluate-report.json"
