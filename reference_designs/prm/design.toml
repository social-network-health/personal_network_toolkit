# Reference-design manifest for prm (Personal Relationship Manager). See
# reference_designs/templates/design.toml for the field reference; the Security
# Target is reference_designs/prm/Architecture.md (a copy of the canonical
# docs/Architecture.md in the design's own repo).
#
# archival stays "pending" until Software Heritage ingest completes (async) and
# the SWHIDs are recorded. The [verify] entrypoint is `just conformance` in the
# canonical repo: it regenerates + shape-checks the attestation and runs the full
# test suite (nonzero on any failure); it emits docs/conformance/evaluate-report.json.

name = "prm"
repo = "https://github.com/richbodo/prm"
toolkit_version = "0.2"
status = "active"
archival = "archived"  # re-pinned to pnt-ref-0.2 (2d6889d) for the v0.2 re-attestation (AC-22 / AC-23 + UM-1/2/3). SWHIDs git-computed/content-addressed; Save Code Now submitted 2026-06-25 — ingest async.

commit    = "2d6889d892e95dc9812e43547500d1abaa23fc32"      # prm@pnt-ref-0.2 — PR #74 (v0.2 re-attestation: AC-22/23 + UM rows)
swhid_rev = "swh:1:rev:2d6889d892e95dc9812e43547500d1abaa23fc32"
swhid_dir = "swh:1:dir:e90b07e1b4c0c1d1023ffc82618ce6341104a79f"

[flavor]
distribution = "never-distributed-single-user"
storage = "native-sqlite-via-filesystem"
ingestion = "multi-source-merge-with-dedup"
workspace = "vanilla-js-spa"
comms = "none"
mcp-exposure = "shared-only"

[verify]
runner = "just"
entrypoint = "just conformance"          # regenerate + shape-check the attestation, run the full suite
emits_report = "evaluate-report.json"
